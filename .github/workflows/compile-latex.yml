name: Compile LaTeX Document

on:
  push:
    paths:
      - 'Project-Phase1/**'
      - '.github/workflows/compile-latex.yml'
  pull_request:
    paths:
      - 'Project-Phase1/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_PAT || github.token }}

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: Project-Phase1

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: main-pdf
          path: Project-Phase1/main.pdf

      - name: Commit compiled PDF
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Project-Phase1/main.pdf
          git diff --cached --quiet || git commit -m "Auto-compile LaTeX PDF [skip ci]"
          git push
